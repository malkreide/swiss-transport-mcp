<svg xmlns="http://www.w3.org/2000/svg" width="640" height="310" viewBox="0 0 640 310">
  <rect width="640" height="310" fill="#0d1117"/>

  <!-- Divider lines -->
  <rect x="0" y="100" width="640" height="1" fill="#30363d"/>
  <rect x="0" y="205" width="640" height="1" fill="#30363d"/>

  <!-- Panel 1: User (y=0, h=100) -->
  <rect x="0" y="0" width="3" height="100" fill="#58a6ff"/>
  <rect x="3" y="0" width="637" height="100" fill="#161b22"/>
  <text x="16" y="20" font-family="monospace" font-size="13" fill="#58a6ff" font-weight="bold">💬 You</text>
  <text x="16" y="44" font-family="monospace" font-size="13" fill="#c9d1d9">Any disruptions between Zürich and Bern right now?</text>
  <text x="16" y="62" font-family="monospace" font-size="13" fill="#c9d1d9">And what's the next train from Zürich HB?</text>

  <!-- Panel 2: Tool Calls (y=101, h=104) -->
  <rect x="0" y="101" width="3" height="104" fill="#e3b341"/>
  <rect x="3" y="101" width="637" height="104" fill="#161b22"/>
  <text x="16" y="121" font-family="monospace" font-size="13" fill="#e3b341" font-weight="bold">🔧 Tool Calls</text>
  <text x="16" y="145" font-family="monospace" font-size="13" fill="#e3b341">get_transport_disruptions(filter_text="Zürich–Bern")</text>
  <text x="16" y="163" font-family="monospace" font-size="13" fill="#e3b341">transport_departures(stop_name="Zürich HB", limit=3)</text>

  <!-- Panel 3: Claude response (y=206, h=104) -->
  <rect x="0" y="206" width="3" height="104" fill="#3fb950"/>
  <rect x="3" y="206" width="637" height="104" fill="#161b22"/>
  <text x="16" y="226" font-family="monospace" font-size="13" fill="#3fb950" font-weight="bold">🤖 Claude</text>
  <text x="16" y="250" font-family="monospace" font-size="13" fill="#c9d1d9">No active disruptions on Zürich–Bern. Next IC 1075 departs</text>
  <text x="16" y="268" font-family="monospace" font-size="13" fill="#c9d1d9">Zürich HB 14:32 (Gleis 7), arrives Bern 15:28. On time.</text>
</svg>
