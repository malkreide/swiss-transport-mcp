services:
  - type: web
    name: swiss-transport-mcp
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      # Core (required)
      - key: TRANSPORT_API_KEY
        sync: false  # Set manually in Render dashboard
      # Extensions (optional – set in Render dashboard)
      - key: SIRI_SX_API_KEY
        sync: false
      - key: OCCUPANCY_API_KEY
        sync: false
      - key: FORMATION_API_KEY
        sync: false
      - key: OJP_FARE_API_KEY
        sync: false
      # Transport settings
      - key: MCP_TRANSPORT
        value: sse
      - key: MCP_HOST
        value: "0.0.0.0"
      - key: MCP_PORT
        value: "8000"
